# Builds the container image and publishes it to GitHub Container Registry
# (ghcr.io) so the project is deployable with a plain `image:` line in
# docker-compose — no clone or local build needed.
#
# Tags produced:
#   ghcr.io/<owner>/mister-retroarch-save-sync:latest      (pushes to main)
#   ghcr.io/<owner>/mister-retroarch-save-sync:vX.Y.Z      (git tags vX.Y.Z)
#   ghcr.io/<owner>/mister-retroarch-save-sync:X.Y         (from the same tag)
#   ghcr.io/<owner>/mister-retroarch-save-sync:sha-<short>  (every push)
#
# One-time setup after the first successful run: on the package's GHCR page
# (Profile -> Packages), set the package visibility to Public so `docker pull`
# works without authentication.

name: docker

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Run the test suite against a fresh build before anything is published.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Test
        run: |
          npm install --no-audit --no-fund
          npm run build
          node test/discriminate.test.js
          node test/mergerfs.test.js
          node test/reconcile.test.js
          node test/odd-length-save.test.js
          node test/newsystems.test.js
          node test/manifest-prune.test.js

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
